  <!-- Mount UI into the page -->
  <script>
    function setActiveTermsTab(tabId, updateHash = false) {
      const targetTab = document.querySelector(`[data-tab="${tabId}"]`);
      const targetContent = document.getElementById(tabId);

      if (!targetTab || !targetContent) return;

      document.querySelectorAll('.terms-tab').forEach((tab) => tab.classList.remove('active'));
      document.querySelectorAll('.terms-content').forEach((content) => content.classList.remove('active'));

      targetTab.classList.add('active');
      targetContent.classList.add('active');

      if (updateHash) {
        history.replaceState(null, '', `#${tabId}`);
      }
    }

    function activateTabFromHash() {
      const hash = window.location.hash.substring(1);
      setActiveTermsTab(hash || 'terms-of-service');
    }

    document.querySelectorAll('.terms-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        setActiveTermsTab(tab.getAttribute('data-tab'), true);
      });
    });

    activateTabFromHash();
    window.addEventListener('hashchange', activateTabFromHash);

  </script>
